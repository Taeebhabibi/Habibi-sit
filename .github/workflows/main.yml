name: CI-CD Pipeline

on:

  push:

    branches:

      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
      - name: Dowload Repa
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Html checker
        run: npm install -g htmlhint
      - name: chect Html
        run: htmlhint index.html
  deploy:
    needs: test

    runs-on: ubuntu-latest


    permissions: write-all
    environment:
      name: github-pages


    steps:
      - name: Download repa
        uses: actions/checkout@v4

      - name: setup githun pages
        uses: actions/configure-pages@v5



      - name: upload ebsite

        uses: actions/upload-pages-artifact@v3
        
        with:
          path: .
  
      - name: Deployweb
        uses: actions/deploy-pages@v4
